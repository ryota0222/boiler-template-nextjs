name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - uses: ./.github/actions/setup-node
      - run: pnpm run typecheck

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - uses: ./.github/actions/setup-node
      - run: pnpm run lint

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - uses: ./.github/actions/setup-node
      - run: pnpm run format

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - uses: ./.github/actions/setup-node
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm run test:coverage

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - uses: ./.github/actions/setup-node
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm run e2e

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - uses: ./.github/actions/setup-node
      - run: pnpm run build

  knip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - uses: ./.github/actions/setup-node
      - run: pnpm run knip

  depcruise:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - uses: ./.github/actions/setup-node
      - run: pnpm run depcruise

  lint-md:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - uses: ./.github/actions/setup-node
      - run: pnpm run lint:md

  lint-text:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - uses: ./.github/actions/setup-node
      - run: pnpm run lint:text

  build-storybook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - uses: ./.github/actions/setup-node
      - run: pnpm run build-storybook

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - uses: jdx/mise-action@f10502fc09dadecfefb962fff68ce77213930204
        with:
          install: true
      - run: pnpm run scan:secretlint
      - run: pnpm run scan:gitleaks

  shell-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - uses: ./.github/actions/setup-node
      - uses: jdx/mise-action@f10502fc09dadecfefb962fff68ce77213930204
        with:
          install: true
      - run: pnpm run lint:sh
      - run: pnpm run format:sh
