pre-commit:
  parallel: true
  jobs:
    - name: lint
      glob: '*.{ts,tsx}'
      exclude: '*.config.ts'
      run: pnpm exec eslint {staged_files}
    - name: format
      run: pnpm exec prettier --check --ignore-unknown {staged_files}
    - name: typecheck
      run: pnpm exec tsc --noEmit
    - name: knip
      run: pnpm exec knip
    - name: depcruise
      run: pnpm exec depcruise src/
    - name: markdownlint
      glob: '*.md'
      run: pnpm exec markdownlint-cli2 {staged_files}
    - name: textlint
      glob: 'src/**/*.tsx'
      run: pnpm exec textlint {staged_files}
    - name: actionlint
      glob: '.github/workflows/*.yaml'
      run: mise exec -- actionlint {staged_files}
    - name: shellcheck
      glob: '*.sh'
      run: mise exec -- shellcheck {staged_files}
    - name: shfmt
      glob: '*.sh'
      run: mise exec -- shfmt -i 2 -ci -bn -sr -d {staged_files}
    - name: gitleaks
      run: mise exec -- gitleaks git --pre-commit --staged --redact --no-banner

commit-msg:
  jobs:
    - name: commitlint
      run: pnpm exec commitlint --edit {1}

pre-push:
  jobs:
    - name: test
      run: pnpm exec vitest run
    - name: gitleaks
      run: mise exec -- pnpm run scan:gitleaks
